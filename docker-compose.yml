services:
  postgres:
    image: postgres:16
    container_name: ota-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ota}
      POSTGRES_USER: ${DB_USER:-ota}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ota}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ota}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ota-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
